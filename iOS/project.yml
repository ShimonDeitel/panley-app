name: Panley
options:
  bundleIdPrefix: com.shimondeitel.pantrytrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Panley:
    type: application
    platform: iOS
    sources:
      - path: Panley
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pantrytrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Panley/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PanleyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PanleyTests
      - path: Panley.storekit
    dependencies:
      - target: Panley
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pantrytrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PanleyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PanleyUITests
    dependencies:
      - target: Panley
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pantrytrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Panley:
    build:
      targets:
        Panley: all
        PanleyTests: [test]
        PanleyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Panley.storekit
    test:
      config: Debug
      storeKitConfiguration: Panley.storekit
      targets:
        - PanleyTests
        - PanleyUITests
    archive:
      config: Release
